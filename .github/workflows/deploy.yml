name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 185.197.250.205
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/bloomcrm
            git pull origin main
            echo "Deployed at $(date)"
